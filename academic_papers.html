<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAI AI Agent Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght=700&family=Pretendard:wght=400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <div class="sub-page-container">
        <div class="narrative-section mobile-hide">
            <div class="sub-title">Research Philosophy and Trajectory</div>
            <h2 class="main-heading">연구의 궤적: 논문과 미공개 연구를 통한 학술적 지평의 확장</h2>
            <p class="essay-paragraph">
                본 공간은 관료제 모형이 지닌 한계를 넘어, 디지털 지능 체계가 어떻게 그 질서를 재구성하는지 그 학문적 여정을 기록하는 데 목적을 둔다.
            </p>
        </div>

        <div class="divider"></div>

        <div class="archive-section">
            <h3 class="section-heading">주요 학술 연구 성과 (Published Papers)</h3>
            <div class="paper-table-wrapper">
                <table class="paper-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">연구분야</th>
                            <th style="width: 50%;">논문 및 저널명</th>
                            <th style="width: 15%;">발행처 / 학회</th>
                            <th style="width: 15%;">발행연도</th>
                        </tr>
                    </thead>
                    <tbody id="published-papers-list"></tbody>
                </table>
            </div>
        </div>

        <div class="archive-section" style="margin-top: 45px;">
            <h3 class="section-heading">진행 중인 연구 및 미발표 논문 (Work in Progress)</h3>
            <div class="paper-table-wrapper">
                <table class="paper-table">
                    <thead>
                        <tr>
                            <th style="width: 20%;">분류</th>
                            <th style="width: 50%;">미발표 연구 과제명 (파일명 연동)</th>
                            <th style="width: 15%;">보안 등급</th>
                            <th style="width: 15%;">열람 통제</th>
                        </tr>
                    </thead>
                    <tbody id="wip-papers-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // [중요] 깃허브용 정적 데이터: 이곳에 논문 정보를 직접 입력하십시오.
        const staticPublishedPapers = [
            { category: "행정철학", title: "디지털 지능형 거버넌스 연구", publisher: "한국행정학보", year: "2026", name: "paper_sample" }
        ];

        const staticWipPapers = [
            { category: "보안과제", title: "주 52시간 근로제 효과 분석", name: "wip_sample" }
        ];

        function renderAcademicArchive() {
            const publishedTbody = document.getElementById('published-papers-list');
            const wipTbody = document.getElementById('wip-papers-list');

            if (publishedTbody) {
                publishedTbody.innerHTML = staticPublishedPapers.map((paper, index) => `
                    <tr class="cursor-pointer hover:bg-gray-800" onclick="alert('PDF 열기: ${paper.name}')">
                        <td class="font-semibold" style="color: #d4af37;">${paper.category}</td>
                        <td>${paper.title}</td>
                        <td>${paper.publisher}</td>
                        <td>${paper.year}</td>
                    </tr>
                `).join('');
            }

            if (wipTbody) {
                wipTbody.innerHTML = staticWipPapers.map((paper, index) => `
                    <tr class="cursor-pointer hover:bg-gray-800" onclick="alert('보안 문서: ${paper.title}')">
                        <td class="font-semibold" style="color: #94a3b8;">${paper.category}</td>
                        <td class="text-white font-medium">${paper.title}</td>
                        <td class="text-rose-400 font-mono text-xs">기밀성(Level 3)</td>
                        <td style="color: #d4af37;">제한 열람 &rarr;</td>
                    </tr>
                `).join('');
            }
        }

        renderAcademicArchive();
    </script>
</body>

</html>
